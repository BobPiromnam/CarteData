<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plotypus Loading Animation Test</title>
  <link rel="icon" href="assets/plotypus-mark.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/fonts/lato/lato-2.woff2" as="font" type="font/woff2" />
  <link rel="preload" href="assets/fonts/lato/lato-4.woff2" as="font" type="font/woff2" />
  <link rel="stylesheet" href="assets/fonts/lato/lato.css?v=20260612-file-fonts" />
  <link rel="stylesheet" href="style.css?v=20260612-tabs-ux" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .loader-test-shell {
      width: min(900px, 100%);
      display: grid;
      gap: 14px;
    }

    .loader-test-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
    }

    .loader-test-host {
      min-height: 420px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .loader-test-canvas {
      width: min(640px, 86%);
      aspect-ratio: 16 / 10;
      margin: 72px auto 40px;
      background:
        linear-gradient(90deg, transparent 49%, rgba(91, 98, 82, 0.08) 50%, transparent 51%),
        linear-gradient(0deg, transparent 49%, rgba(91, 98, 82, 0.08) 50%, transparent 51%),
        var(--map-background);
      background-size: 80px 80px;
      box-shadow:
        0 0 0 1px rgba(40, 42, 39, 0.22),
        0 16px 34px rgba(40, 42, 39, 0.20);
    }
  </style>
</head>
<body>
  <main class="loader-test-shell">
    <h1 class="loader-test-title">Plotypus loading animation test</h1>
    <div class="map-host loader-test-host is-rendering" aria-busy="true">
      <div class="preview-loading" role="status" aria-live="polite">
        <span class="plotypus-loader" aria-hidden="true">
          <svg viewBox="0 0 118 52" focusable="false">
            <path class="plotypus-loader-route" d="M8 38 C28 12 45 42 63 18 S91 11 110 31" />
            <g class="plotypus-loader-points">
              <circle cx="8" cy="38" r="3" />
              <circle cx="28" cy="21" r="3" />
              <circle cx="45" cy="35" r="3" />
              <circle cx="63" cy="18" r="3" />
              <circle cx="87" cy="15" r="3" />
              <circle cx="110" cy="31" r="3" />
            </g>
            <g class="plotypus-loader-pin">
              <path class="plotypus-loader-body" d="M0 25c-5-7-13-14-13-25 0-14 11-20 25-20S37-14 37 0c0 11-8 18-13 25l-12 14Z" />
              <path class="plotypus-loader-hair" d="M6-18c1-6 3-9 6-9s5 3 6 9c4-4 7-5 10-2 2 3 0 7-5 11H1c-5-4-7-8-5-11 3-3 6-2 10 2Z" />
              <path class="plotypus-loader-eye" d="M-8-2c4-7 12-7 16 0" />
              <path class="plotypus-loader-eye" d="M16-2c4-7 12-7 16 0" />
              <path class="plotypus-loader-bill" d="M-1 12c2-9 11-13 22-13s20 4 22 13c1 5 1 12 4 18 3 6-1 12-8 14-11 4-26 4-37 0-7-2-11-8-8-14 3-6 3-13 4-18Z" />
              <circle class="plotypus-loader-nostril" cx="11" cy="28" r="2" />
              <circle class="plotypus-loader-nostril" cx="31" cy="28" r="2" />
            </g>
          </svg>
        </span>
        <span>Plotting preview</span>
      </div>
      <div class="loader-test-canvas" aria-hidden="true"></div>
    </div>
  </main>
</body>
</html>
